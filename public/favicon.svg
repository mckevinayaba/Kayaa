<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black rounded-square background, matching PWA icon -->
  <rect width="32" height="32" rx="7" fill="#0D1117"/>

  <!--
    Pixel-style "K" in Kayaa green (#39D98A).

    Anatomy:
      Left vertical bar  — x 6–11, full height y 4–28
      Upper arm          — 4-step staircase going up-right from centre
      Lower arm          — 4-step staircase going down-right from centre
    Each step: 4 px wide × 3 px tall.
  -->

  <!-- Left bar -->
  <rect x="6"  y="4"  width="5" height="24" fill="#39D98A"/>

  <!-- Upper arm -->
  <rect x="11" y="13" width="4" height="3"  fill="#39D98A"/>
  <rect x="15" y="10" width="4" height="3"  fill="#39D98A"/>
  <rect x="19" y="7"  width="4" height="3"  fill="#39D98A"/>
  <rect x="23" y="4"  width="4" height="3"  fill="#39D98A"/>

  <!-- Lower arm -->
  <rect x="11" y="16" width="4" height="3"  fill="#39D98A"/>
  <rect x="15" y="19" width="4" height="3"  fill="#39D98A"/>
  <rect x="19" y="22" width="4" height="3"  fill="#39D98A"/>
  <rect x="23" y="25" width="4" height="3"  fill="#39D98A"/>
</svg>
