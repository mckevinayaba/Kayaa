<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon — v2 busts any cached purple icon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <!-- Fallback for browsers that don't support SVG favicons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kayaa — Your neighbourhood</title>
    <meta name="description" content="Kayaa is the neighbourhood place network for Africa. Find the barbershop, spaza, shisanyama, church, carwash and clinic that your community already goes to." />
    <meta name="keywords" content="neighbourhood app, local places, Africa, township, spaza, barbershop, shisanyama, community, check in" />
    <link rel="canonical" href="https://kayaa.africa/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://kayaa.africa/" />
    <meta property="og:title"       content="Kayaa — Your neighbourhood" />
    <meta property="og:description" content="Every place your community keeps coming back to — on one map. Barbershops, spazas, taverns, churches, clinics and more." />
    <meta property="og:image"       content="https://kayaa.africa/icon-512.png" />
    <meta property="og:site_name"   content="Kayaa" />
    <meta property="og:locale"      content="en_ZA" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Kayaa — Your neighbourhood" />
    <meta name="twitter:description" content="Every place your community keeps coming back to — on one map." />
    <meta name="twitter:image"       content="https://kayaa.africa/icon-512.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json?v=2" />

    <!-- Browser / OS chrome colour — Kayaa dark background -->
    <meta name="theme-color" content="#0D1117" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kayaa" />
    <link rel="apple-touch-icon" href="/icon-192.png?v=2" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
